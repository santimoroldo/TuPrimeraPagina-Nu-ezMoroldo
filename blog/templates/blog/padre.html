<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adsum Tech | Entrega Python</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f111a; color: #e0e0e0; }
        .navbar { background-color: #1a1d29 !important; border-bottom: 2px solid #007bff; }
        .navbar-brand { font-weight: bold; color: #007bff !important; }
        .container-main { margin-top: 60px; min-height: 70vh; }
        footer { margin-top: 80px; padding: 30px; text-align: center; background-color: #1a1d29; border-top: 1px solid #333; }
        .alert-success { background-color: #0f5132; color: #d1e7dd; border-color: #0a3622; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'Inicio' %}">ADSUM TECH</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'Inicio' %}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'AutorFormulario' %}">Cargar Autor</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'SeccionFormulario' %}">Cargar Sección</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'PostFormulario' %}">Cargar Post</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'BusquedaAutor' %}">Buscar Autor</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container container-main">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                {% if mensaje %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{ mensaje }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endif %}

                {% block contenidoQueCambia %}
                {% endblock %}

            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Adsum Tech - Entrega Final Coderhouse</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
